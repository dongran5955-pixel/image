name: Build Windows Portable App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/**'
      - 'assets/**'
      - 'index.html'
      - 'package.json'
      - '.github/workflows/build-windows-portable.yml'

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable Windows app
        run: npm run dist:win

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: Dongge-AI-Image-Hub-Windows-Portable
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
