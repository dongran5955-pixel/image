name: Build Windows Portable App

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/**'
      - 'assets/**'
      - 'index.html'
      - 'package.json'
      - '.github/workflows/build-windows-portable.yml'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable Windows app
        run: npm run dist:win

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dongge-AI-Image-Hub-Windows-Portable
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish download release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-windows-latest
          name: 董哥 AI 灵感库 · Windows 免安装版
          body: |
            Windows 免安装桌面版：下载 EXE 文件后直接双击使用。
            支持本地导入图片、填写和修改提示词、分类管理、一键复制提示词。
          files: release/*.exe
          make_latest: true

      - name: Record successful build
        shell: pwsh
        run: |
          $time = Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC'
          @"
          # Windows 桌面版构建状态

          - 状态：构建成功
          - 版本：1.0.0
          - 构建时间：$time
          - 下载位置：GitHub Releases 中的“董哥 AI 灵感库 · Windows 免安装版”
          - 文件名：Dongge-AI-Image-Hub-Portable-1.0.0.exe
          "@ | Set-Content -Path BUILD_STATUS.md -Encoding utf8
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BUILD_STATUS.md
          git commit -m 'Record successful Windows portable build' || exit 0
          git push
